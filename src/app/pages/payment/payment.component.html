<div class="delivery-page container py-5" dir="rtl">

  <div class="row align-items-center g-5">

    <!-- IMAGE -->
    <div class="col-lg-5">

      <div class="delivery-image-wrapper">

        <img src="assets/images/ts.png" alt="delivery" class="delivery-image">

      </div>

    </div>

    <!-- FORM -->
    <div class="col-lg-7">

      <div class="delivery-card">

        <!-- HEADER -->
        <div class="delivery-header">

          <span class="delivery-badge">

            معلومات التوصيل

          </span>

          <h2 class="delivery-title">

            بيانات الشحن

          </h2>

          <p class="delivery-subtitle">

            أدخلي بياناتك لإتمام الطلب بسهولة

          </p>

        </div>

        <!-- FORM -->
        <form [formGroup]="deliveryForm" (ngSubmit)="onSubmit()">

          <!-- FULL NAME -->
          <div class="mb-4">

            <label for="fullName" class="form-label">

              الاسم بالكامل

            </label>

            <input type="text" id="fullName" class="form-control custom-input" formControlName="fullName"
              placeholder="اكتبي اسمك بالكامل">

            <div *ngIf="
                deliveryForm.get('fullName')?.touched &&
                deliveryForm.get('fullName')?.invalid
              " class="validation-error">

              هذا الحقل مطلوب

            </div>

          </div>

          <!-- GOVERNORATE -->
          <div class="mb-4">

            <label for="governorate" class="form-label">

              المحافظة

            </label>

            <input type="text" id="governorate" class="form-control custom-input" formControlName="governorate"
              placeholder="المحافظة">

            <div *ngIf="
                deliveryForm.get('governorate')?.touched &&
                deliveryForm.get('governorate')?.invalid
              " class="validation-error">

              هذا الحقل مطلوب

            </div>

          </div>

          <!-- ADDRESS -->
          <div class="mb-4">

            <label for="detailedAddress" class="form-label">

              العنوان بالتفصيل

            </label>

            <textarea id="detailedAddress" rows="3" class="form-control custom-input" formControlName="detailedAddress"
              placeholder="المدينة - الشارع - أقرب علامة مميزة">

            </textarea>

            <div *ngIf="
                deliveryForm.get('detailedAddress')?.touched &&
                deliveryForm.get('detailedAddress')?.invalid
              " class="validation-error">

              هذا الحقل مطلوب

            </div>

          </div>

          <!-- PHONE -->
          <div class="mb-4">

            <label for="phoneNumber" class="form-label">

              رقم الهاتف

            </label>

            <input type="tel" id="phoneNumber" class="form-control custom-input" formControlName="phoneNumber"
              placeholder="01xxxxxxxxx">

            <div *ngIf="
                deliveryForm.get('phoneNumber')?.touched &&
                deliveryForm.get('phoneNumber')?.invalid
              " class="validation-error">

              <span *ngIf="
                  deliveryForm.get('phoneNumber')?.errors?.['required']
                ">

                هذا الحقل مطلوب

              </span>

              <span *ngIf="
                  deliveryForm.get('phoneNumber')?.errors?.['pattern']
                ">

                يرجى إدخال رقم صحيح

              </span>

            </div>

          </div>

          <!-- ADDITIONAL PHONE -->
          <div class="mb-4">

            <label for="additionalPhone" class="form-label">

              رقم إضافي (اختياري)

            </label>

            <input type="tel" id="additionalPhone" class="form-control custom-input" formControlName="additionalPhone"
              placeholder="رقم إضافي">

          </div>

          <!-- NOTES -->
          <div class="mb-4">

            <label for="additionalInfo" class="form-label">

              ملاحظات إضافية

            </label>

            <textarea id="additionalInfo" rows="2" class="form-control custom-input" formControlName="additionalInfo"
              placeholder="أي تفاصيل إضافية للمندوب">

            </textarea>

          </div>

          <!-- BUTTON -->
          <button type="submit" class="btn btn-maroon w-100">

            متابعة الدفع

          </button>

        </form>

      </div>

    </div>

  </div>

</div>
