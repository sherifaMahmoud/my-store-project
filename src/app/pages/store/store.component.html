<div class="container my-4">
  <h3 class="text-center text-maroon">أهلا بك في متجر يدنين</h3>
  <hr class="mx-auto" style="width: 20%;" />

  <div class="row">
    <div class="col-md-3">
      <div class="card p-3 mb-4">
        <h5 class="text-center text-secondary">التصنيف</h5>
        <hr />

        <!-- القسم -->
        <div class="mb-3">
          <p>القسم</p>
          <div *ngFor="let category of categories">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="{{category}}" [checked]="selectedCategories.includes(category)" (change)="toggleCategory(category)">
              <label class="form-check-label" for="{{category}}">
                {{category}}
              </label>
            </div>
          </div>
        </div>

        <!-- السعر -->
        <div class="mb-3">
          <p>السعر</p>
          <div *ngFor="let price of prices">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="{{price}}" [checked]="selectedPriceRanges.includes(price)" (change)="togglePriceRange(price)">
              <label class="form-check-label" for="{{price}}">
                {{price}}
              </label>
            </div>
          </div>
        </div>

        <!-- اللون -->
        <div class="mb-3">
          <p>اللون</p>
          <div *ngFor="let color of colors">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="{{color}}" [checked]="selectedColors.includes(color)" (change)="toggleColor(color)">
              <label class="form-check-label" for="{{color}}">
                {{color}}
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- المنتجات -->
    <div class="col-md-9">
      <div class="row">
        <div *ngFor="let product of visibleProducts" class="col-md-3 mb-4">
          <div class="card h-100">
            <img [src]="product.imageUrl" class="card-img-top" alt="منتج">
            <div class="card-body text-center d-flex flex-column">
              <h5 class="card-title">{{product.name}}</h5>
              <p class="price fw-bold">{{product.price}} ج</p>
              <div class="mt-auto">
                <button (click)="addToCart(product)" class="btn btn-maroon w-100">أضف إلى السلة</button>
                <a [routerLink]="['/product-details', product.productId]" class="btn btn-outline-maroon">عرض المنتج</a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- عرض المزيد -->
      <div class="text-center my-3" *ngIf="visibleProducts.length < products.length">
        <button class="btn btn-outline-maroon" (click)="loadMore()">عرض المزيد</button>
      </div>
    </div>
  </div>
</div>
