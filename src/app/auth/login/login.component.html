<div class="container min-vh-100 d-flex align-items-center justify-content-center">
  <div class="row w-100 flex-md-row-reverse align-items-start">

    <!-- صورة تسجيل الدخول -->
    <div class="col-md-6 text-center mb-4 mb-md-0 d-flex justify-content-center">
      <img src="assets/images/loging.png" alt="تسجيل الدخول" class="img-fluid" style="max-width: 350px; height: auto;">
    </div>

    <!-- نموذج تسجيل الدخول -->
    <div class="col-md-6 d-flex flex-column align-items-center align-items-md-start">

      <h2 class="mt-0 mb-4 logo-font" style="color: #5D1037; font-weight: 600; font-size: 2.5rem;">تسجيل الدخول</h2>



      <!-- نموذج تسجيل الدخول -->
      <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate class="w-75">

        <div class="mb-3">
          <input
            type="text"
            formControlName="userName"
            class="form-control text-end"
            placeholder="اسم المستخدم"
            [class.is-invalid]="loginForm.get('userName')?.invalid && loginForm.get('userName')?.touched"
            style="border-radius: 30px; padding: 10px;">
        </div>

        <div class="mb-3">
          <input
            type="password"
            formControlName="password"
            class="form-control text-end"
            placeholder="كلمة السر"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            style="border-radius: 30px; padding: 10px;">
        </div>

        <!-- خانة "تذكرني" -->
        <div class="form-check d-flex align-items-center justify-content-start mb-3">
          <input type="checkbox" class="form-check-input" id="rememberMe" style="margin-right: 10px;">
          <label class="form-check-label ms-2" for="rememberMe" style="font-size: 1rem;">تذكرني</label>
        </div>

        <!-- زر "تسجيل الدخول" -->
        <button type="submit" class="btn btn-maroon w-100 py-2" [disabled]="loginForm.invalid" style="border-radius: 30px; font-weight: 600;">
          تسجيل الدخول
        </button>
      </form>

      <!-- رابط لإنشاء حساب جديد -->
      <div class="text-end mt-4 w-75">
        <span>ليس لديك حساب؟</span>
        <a routerLink="/register" style="color: #5D1037; font-weight: 600; font-size: 1.1rem;">إنشاء حساب</a>
      </div>
    </div>

  </div>
</div>
